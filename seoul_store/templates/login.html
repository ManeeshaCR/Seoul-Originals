{% extends 'base.html' %}
{% block content %}

<div class="auth">
  <div class="auth-box">

    <h2>Welcome Back</h2>

    <form method="POST">
      {% csrf_token %}

      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>

      <button class="btn-main">Login</button>
    </form>
    <p><a href="/signup">Create Account</a></p>

  </div>
</div>

{% endblock %}
