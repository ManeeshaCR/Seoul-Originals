{% extends "base.html" %}

{% block content %}

<div class="auth">
  <div class="auth-box" style="width: 500px;">

    <h4 class="mb-3">Wholesale Account</h4>

    <form method="POST">
      {% csrf_token %}

      <input type="text" name="username" placeholder="Username" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>

      <hr>

      <input type="text" name="company_name" placeholder="Company Name *" required>
      <input type="text" name="business_website" placeholder="Website / Facebook">
      <input type="text" name="phone" placeholder="Phone Number">
      <input type="text" name="address" placeholder="Business Address">

      <button class="btn-main mt-2">Apply for Wholesale</button>
    </form>

    <p class="mt-3 small">
      Your account will require admin approval before access.
    </p>

  </div>
</div>

{% endblock %}
