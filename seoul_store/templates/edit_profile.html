{% extends 'base.html' %}
{% block content %}

<div class="container mt-5" style="max-width:500px;">

  <h3 class="mb-4 text-center">Edit Profile</h3>

  <form method="POST">
    {% csrf_token %}


<label>Phone</label>
<input name="phone" value="{{ profile.phone }}" class="form-control mb-3">

<label>Age</label>
<input name="age" value="{{ profile.age }}" class="form-control mb-3">

<label>Gender</label>
<select name="gender" class="form-control mb-3">
  <option value="">Select</option>
  <option value="male" {% if profile.gender == "male" %}selected{% endif %}>Male</option>
  <option value="female" {% if profile.gender == "female" %}selected{% endif %}>Female</option>
  <option value="other" {% if profile.gender == "other" %}selected{% endif %}>Other</option>
</select>

<button class="btn btn-dark w-100">Save Changes</button>


  </form>

</div>

{% endblock %}
