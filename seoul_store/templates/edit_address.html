{% extends 'base.html' %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

  <div class="card p-4 shadow-sm">
    <h4 class="mb-3">Edit Address</h4>

    <form method="POST">
      {% csrf_token %}

      <input type="text" name="full_name" class="form-control mb-3"
             placeholder="Full Name" value="{{ address.full_name }}">

      <input type="text" name="phone" class="form-control mb-3"
             placeholder="Phone Number" value="{{ address.phone }}">

      <textarea name="address_line" class="form-control mb-3"
                placeholder="Address">{{ address.address_line }}</textarea>

      <input type="text" name="city" class="form-control mb-3"
             placeholder="City" value="{{ address.city }}">

      <button class="btn btn-dark w-100">Update Address</button>
    
      <a href="{% url 'account' %}" class="btn btn-outline-dark w-100 mt-2">
        Cancel
     </a>
    </form>
  </div>

</div>

{% endblock %}
